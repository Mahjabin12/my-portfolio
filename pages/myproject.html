<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Projects — Mahjabin Nahar</title>

  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <link rel="stylesheet" href="../common/common.css" />
</head>

<body>
  <header id="siteHeader" class="page-navbar sticky top-0 z-50">
    <div class="container-x flex h-20 items-center justify-between">
      <a href="../index.html" class="flex items-center gap-3">
        <span class="grid h-9 w-9 place-items-center rounded-full bg-[var(--text)] text-[var(--bg)] text-[10px] font-bold">
          MN
        </span>
        <span class="display-font text-[1.45rem] font-semibold tracking-tight">
          Mahjabin Nahar
        </span>
      </a>

      <nav class="hidden items-center gap-2 md:flex">
        <a href="../index.html#home" class="nav-pill rounded-full px-5 py-2.5 text-[15px] font-medium">Home</a>
        <a href="myproject.html" class="nav-pill active rounded-full px-5 py-2.5 text-[15px] font-medium">Projects</a>
        <a href="about-me.html" class="nav-pill rounded-full px-5 py-2.5 text-[15px] font-medium">About</a>
        <a href="contactme.html" class="nav-pill rounded-full px-5 py-2.5 text-[15px] font-medium">Contact</a>
      </nav>

      <div class="flex items-center gap-3">
        <button id="themeToggle" type="button" class="theme-toggle-btn" aria-label="Toggle theme">
          <i id="themeIcon" class="fa-regular fa-sun"></i>
        </button>

        <a href="../my cv/cv.html" class="resume-btn hidden md:inline-flex">
          <i class="fa-solid fa-download text-sm"></i>
          Resume
        </a>
      </div>
    </div>
  </header>

  <main>
    <section class="container-x pt-16 pb-12 md:pt-24">
      <div class="reveal">
        <p id="project-count" class="eyebrow mb-4">Index · Projects</p>

        <h1 class="display-1 max-w-5xl">
          Things I've designed,<br />
          and what I learned.
        </h1>

        <p class="mt-8 max-w-2xl text-lg leading-relaxed text-muted">
          A mix of case studies, concepts, and explorations. Each project focuses on
          the problem, design decisions, solution, and reflection.
        </p>
      </div>
    </section>

    <section class="container-x">
      <div id="filterBar" class="reveal flex flex-wrap items-center gap-2 border-y border-[var(--border)] py-4"></div>
    </section>

    <section class="container-x pb-24 pt-12">
      <div id="projectGrid" class="grid gap-12 md:grid-cols-2 md:gap-x-10 md:gap-y-16"></div>
    </section>
  </main>

  <div id="footer"></div>

  <button id="scrollToTop" class="scroll-top-btn" aria-label="Scroll to top">
    <i class="fa-solid fa-arrow-up"></i>
  </button>

  <script src="../common/projects.js"></script>

  <script>
    const projects = PortfolioProjects.projects;
    const categories = PortfolioProjects.getCategories();

    const filterBar = document.getElementById("filterBar");
    const projectGrid = document.getElementById("projectGrid");
    const projectCount = document.getElementById("project-count");

    let currentFilter = "All";

    projectCount.textContent = `Index · ${projects.length} projects`;

    function renderFilters() {
      filterBar.innerHTML = categories
        .map((category) => {
          const active = category === currentFilter ? "project-filter-btn active" : "project-filter-btn";

          return `
            <button class="${active}" type="button" data-category="${category}">
              ${category}
            </button>
          `;
        })
        .join("");

      document.querySelectorAll(".project-filter-btn").forEach((button) => {
        button.addEventListener("click", () => {
          currentFilter = button.dataset.category;
          renderFilters();
          renderProjects();
        });
      });
    }

    function renderProjects() {
  const filteredProjects =
    currentFilter === "All"
      ? projects
      : projects.filter((project) => project.category === currentFilter);

  projectGrid.innerHTML = filteredProjects
    .map((project, index) => {
      const direction = index % 2 === 0 ? "from-left" : "from-right";

      return `
        <article class="project-card project-index-card group reveal ${direction}" data-delay="${index * 70}">
          
          <a href="project-detail.html?id=${project.id}" class="block text-[var(--text)] no-underline">
            <div class="project-cover project-index-cover">
              <div class="project-cover-inner">
                <p class="eyebrow mb-3 text-[var(--primary)]">${project.category}</p>
                <h2 class="display-font text-5xl font-medium">${project.shortTitle}</h2>
              </div>
            </div>
          </a>

          <div class="mt-5 flex items-start justify-between gap-5">
            <div class="min-w-0">
              <div class="flex items-center gap-2 text-xs text-muted">
                <span>${String(index + 1).padStart(2, "0")}</span>
                <span>·</span>
                <span>${project.category}</span>
              </div>

              <h3 class="display-font mt-2 text-3xl font-medium">
                ${project.title}
              </h3>

              <p class="mt-2 max-w-xl text-base leading-relaxed text-muted">
                ${project.tagline}
              </p>

              <div class="mt-4 flex flex-wrap gap-2">
                ${project.tags.map((tag) => `<span class="project-tag">${tag}</span>`).join("")}
              </div>

              <div class="mt-5 flex flex-wrap gap-3">
                <a
                  href="${project.live}"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="project-live-btn"
                >
                  View Live
                  <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                </a>

                <a
                  href="project-detail.html?id=${project.id}"
                  class="project-case-btn"
                >
                  Case Study
                  <i class="fa-solid fa-arrow-right text-xs"></i>
                </a>
              </div>
            </div>

            <a href="project-detail.html?id=${project.id}" class="project-arrow" aria-label="View ${project.title}">
              <i class="fa-solid fa-arrow-up-right-from-square text-sm"></i>
            </a>
          </div>
        </article>
      `;
    })
    .join("");

  initRevealAnimation();
}

    function initRevealAnimation() {
      const revealItems = document.querySelectorAll(".reveal:not(.is-visible)");

      if (!("IntersectionObserver" in window)) {
        revealItems.forEach((item) => item.classList.add("is-visible"));
        return;
      }

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) return;

            const delay = entry.target.dataset.delay || "0";
            entry.target.style.transitionDelay = `${delay}ms`;
            entry.target.classList.add("is-visible");
            observer.unobserve(entry.target);
          });
        },
        {
          threshold: 0.12,
          rootMargin: "0px 0px -40px 0px"
        }
      );

      revealItems.forEach((item) => observer.observe(item));
    }

    function initThemeToggle() {
      const themeToggle = document.getElementById("themeToggle");
      const themeIcon = document.getElementById("themeIcon");

      const storedTheme = localStorage.getItem("theme");
      const initialTheme = storedTheme || "dark";

      document.documentElement.setAttribute("data-theme", initialTheme);
      themeIcon.className = initialTheme === "dark" ? "fa-regular fa-sun" : "fa-regular fa-moon";

      themeToggle.addEventListener("click", () => {
        const currentTheme = document.documentElement.getAttribute("data-theme");
        const nextTheme = currentTheme === "dark" ? "light" : "dark";

        document.documentElement.setAttribute("data-theme", nextTheme);
        localStorage.setItem("theme", nextTheme);
        themeIcon.className = nextTheme === "dark" ? "fa-regular fa-sun" : "fa-regular fa-moon";
      });
    }

    function initScrollToTopButton() {
      const scrollButton = document.getElementById("scrollToTop");

      window.addEventListener("scroll", () => {
        scrollButton.classList.toggle("show", window.scrollY > 500);
      }, { passive: true });

      scrollButton.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    }

    renderFilters();
    renderProjects();
    initThemeToggle();
    initScrollToTopButton();



    loadFooter();

async function loadFooter() {
  const footerTarget = document.getElementById("footer");

  if (!footerTarget) return;

  try {
    const response = await fetch("../section/footer.html");

    if (!response.ok) {
      throw new Error("Footer failed to load");
    }

    footerTarget.innerHTML = await response.text();

    fixFooterLinksForPages();

    if (typeof initRevealAnimation === "function") {
      initRevealAnimation();
    }
  } catch (error) {
    console.error(error);
  }
}

function fixFooterLinksForPages() {
  const footer = document.getElementById("footer");

  if (!footer) return;

  footer.querySelectorAll("a").forEach((link) => {
    const href = link.getAttribute("href");

    if (!href) return;

    if (href === "#home") {
      link.setAttribute("href", "../index.html#home");
    }

    if (href === "index.html") {
      link.setAttribute("href", "../index.html");
    }

    if (href.startsWith("pages/")) {
      link.setAttribute("href", href.replace("pages/", ""));
    }

    if (href.startsWith("my cv/")) {
      link.setAttribute("href", "../" + href);
    }
  });
}
  </script>
</body>
</html>
