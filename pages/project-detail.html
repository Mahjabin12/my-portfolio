<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Project — Mahjabin Nahar</title>

  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <link rel="stylesheet" href="../common/common.css" />

  <style>
    .project-detail-title {
      font-family: "Fraunces", serif;
      font-size: clamp(3.1rem, 6vw, 5.3rem);
      line-height: 0.92;
      letter-spacing: -0.055em;
      font-weight: 500;
      color: var(--text);
    }

    .project-detail-lead {
      font-size: clamp(1rem, 1.35vw, 1.16rem);
      line-height: 1.75;
    }

    .project-meta-value {
      margin-top: 8px;
      font-family: "Fraunces", serif;
      font-size: 1.05rem;
      line-height: 1.2;
      color: var(--text);
    }

    .project-detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .project-live-btn,
    .project-github-btn,
    .project-case-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border-radius: 999px;
      padding: 11px 17px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 220ms ease, background 220ms ease, color 220ms ease, border-color 220ms ease, box-shadow 220ms ease, opacity 220ms ease;
    }

    .project-live-btn {
      background: var(--primary);
      color: #160b05;
      border: 1px solid var(--primary);
    }

    .project-live-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(255, 130, 56, 0.22);
    }

    .project-github-btn {
      background: var(--text);
      color: var(--bg);
      border: 1px solid var(--text);
    }

    .project-github-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
    }

    .project-github-btn.is-disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    .project-case-btn {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .project-case-btn:hover {
      transform: translateY(-2px);
      background: var(--secondary);
      border-color: rgba(255, 130, 56, 0.34);
    }

    .case-section-title {
      font-family: "Fraunces", serif;
      font-size: clamp(2.4rem, 4.5vw, 4.1rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
      font-weight: 500;
      color: var(--text);
    }

    .project-detail-cover-title {
      font-family: "Fraunces", serif;
      font-size: clamp(3rem, 6vw, 5.4rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      font-weight: 500;
      color: var(--text);
    }

    .mobile-menu-btn {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-menu-btn {
        display: inline-grid;
      }

      .project-detail-title {
        font-size: clamp(2.7rem, 14vw, 3.8rem);
      }

      .project-detail-actions {
        gap: 10px;
      }

      .project-live-btn,
      .project-github-btn,
      .project-case-btn {
        width: 100%;
      }

      .project-detail-lead {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <header id="siteHeader" class="page-navbar sticky top-0 z-50">
    <div class="container-x flex h-20 items-center justify-between">
      <a href="../index.html" class="flex items-center gap-3">
        <span class="grid h-9 w-9 place-items-center rounded-full bg-[var(--text)] text-[var(--bg)] text-[10px] font-bold">
          MN
        </span>

        <span class="display-font text-[1.45rem] font-semibold tracking-tight">
          Mahjabin Nahar
        </span>
      </a>

      <nav class="hidden items-center gap-2 md:flex">
        <a href="../index.html#home" class="nav-pill rounded-full px-5 py-2.5 text-[15px] font-medium">Home</a>
        <a href="myproject.html" class="nav-pill active rounded-full px-5 py-2.5 text-[15px] font-medium">Projects</a>
        <a href="about-me.html" class="nav-pill rounded-full px-5 py-2.5 text-[15px] font-medium">About</a>
        <a href="contactme.html" class="nav-pill rounded-full px-5 py-2.5 text-[15px] font-medium">Contact</a>
      </nav>

      <div class="flex items-center gap-3">
        <button id="themeToggle" type="button" class="theme-toggle-btn" aria-label="Toggle theme">
          <i id="themeIcon" class="fa-regular fa-sun"></i>
        </button>

        <a href="../my cv/cv.html" class="resume-btn hidden md:inline-flex">
          <i class="fa-solid fa-download text-sm"></i>
          Resume
        </a>

        <button id="menuBtn" type="button" class="theme-toggle-btn mobile-menu-btn md:hidden" aria-label="Toggle menu">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </div>

    <div id="mobileMenu" class="hidden border-t border-[var(--border)] bg-[var(--bg)] md:hidden">
      <div class="container-x flex flex-col gap-2 py-5">
        <a href="../index.html#home" class="nav-pill rounded-xl px-4 py-3 text-sm font-medium">Home</a>
        <a href="myproject.html" class="nav-pill active rounded-xl px-4 py-3 text-sm font-medium">Projects</a>
        <a href="about-me.html" class="nav-pill rounded-xl px-4 py-3 text-sm font-medium">About</a>
        <a href="contactme.html" class="nav-pill rounded-xl px-4 py-3 text-sm font-medium">Contact</a>

        <a href="../my cv/cv.html" class="resume-btn mt-3 justify-center">
          <i class="fa-solid fa-download text-sm"></i>
          Download Resume
        </a>
      </div>
    </div>
  </header>

  <main id="projectDetail"></main>

  <div id="footer"></div>

  <button id="scrollToTop" class="scroll-top-btn" aria-label="Scroll to top">
    <i class="fa-solid fa-arrow-up"></i>
  </button>

  <script src="../common/projects.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const project = PortfolioProjects.getProject(id);
    const detailRoot = document.getElementById("projectDetail");

    if (!project) {
      document.title = "Project not found — Mahjabin Nahar";

      detailRoot.innerHTML = `
        <section class="container-x py-32 text-center">
          <h1 class="display-2">Project not found</h1>
          <p class="mt-5 text-muted">It might have been renamed or moved.</p>

          <a href="myproject.html" class="mt-8 inline-flex cta-btn cta-primary">
            ← All projects
          </a>
        </section>
      `;
    } else {
      renderProject(project);
    }

    function renderProject(project) {
      const next = PortfolioProjects.getNextProject(project.id);
      const githubButton = getGithubButton(project);

      document.title = `${project.title} — Mahjabin Nahar`;

      detailRoot.innerHTML = `
        <article class="pb-24">
          
          <!-- Hero -->
          <header class="container-x pt-12 pb-12 md:pt-20">
            <div class="reveal">
              <a href="myproject.html" class="project-back-link">
                ← All projects
              </a>

              <div class="mt-8 flex flex-wrap items-center gap-2">
                ${project.tags.map((tag) => `<span class="project-tag">${tag}</span>`).join("")}
              </div>

              <h1 class="project-detail-title mt-6 max-w-5xl">
                ${project.title}
              </h1>

              <p class="project-detail-lead mt-6 max-w-3xl text-muted">
                ${project.oneLiner}
              </p>

              <dl class="mt-9 grid gap-5 border-t border-[var(--border)] pt-7 sm:grid-cols-3">
                <div>
                  <dt class="eyebrow">Year</dt>
                  <dd class="project-meta-value">${project.year}</dd>
                </div>

                <div>
                  <dt class="eyebrow">Role</dt>
                  <dd class="project-meta-value">${project.role}</dd>
                </div>

                <div>
                  <dt class="eyebrow">Category</dt>
                  <dd class="project-meta-value">${project.category}</dd>
                </div>
              </dl>

              <div class="project-detail-actions">
                <a 
                  href="${project.live}" 
                  target="_blank" 
                  rel="noopener noreferrer" 
                  class="project-live-btn"
                >
                  View Live
                  <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                </a>

                ${githubButton}

                <a 
                  href="myproject.html" 
                  class="project-case-btn"
                >
                  Back to Projects
                  <i class="fa-solid fa-arrow-left text-xs"></i>
                </a>
              </div>
            </div>
          </header>

          <!-- Cover -->
          <section class="container-x reveal">
            <div class="project-detail-cover">
              <div>
                <p class="eyebrow mb-4 text-[var(--primary)]">${project.category}</p>
                <h2 class="project-detail-cover-title">${project.shortTitle}</h2>
              </div>
            </div>
          </section>

          ${renderCaseSection("01", "Context & Problem", `
            <p class="text-base leading-8 text-[var(--text)] md:text-lg">${project.problem}</p>

            <div class="mt-8 rounded-2xl border border-[var(--border)] bg-[var(--surface)] p-6">
              <p class="eyebrow mb-3">Constraints</p>
              <p class="text-sm leading-7 text-muted md:text-base">${project.constraints}</p>
            </div>
          `, "from-left")}

          ${renderCaseSection("02", "Research insight", `
            <blockquote class="case-quote">
              ${project.researchInsight}
            </blockquote>
          `, "from-right")}

          ${renderCaseSection("03", "The process & key decisions", `
            <ol class="space-y-6">
              ${project.decisions.map((item, index) => `
                <li class="decision-card">
                  <div class="display-font decision-number">0${index + 1}</div>

                  <div>
                    <h3 class="display-font text-xl font-medium md:text-2xl">${item.decision}</h3>

                    <div class="mt-5 grid gap-5 sm:grid-cols-2">
                      <div>
                        <p class="eyebrow mb-2">Why</p>
                        <p class="text-sm leading-7 text-muted">${item.why}</p>
                      </div>

                      <div>
                        <p class="eyebrow mb-2">Tradeoff</p>
                        <p class="text-sm leading-7 text-muted">${item.tradeoff}</p>
                      </div>
                    </div>
                  </div>
                </li>
              `).join("")}
            </ol>
          `, "from-left")}

          ${renderCaseSection("04", "The solution", `
            <div class="space-y-10">
              ${project.solution.map((item, index) => `
                <figure class="solution-row">
                  <div class="solution-visual">
                    <div>
                      <p class="eyebrow mb-3 text-[var(--primary)]">Screen 0${index + 1}</p>
                      <h3 class="display-font text-3xl font-medium md:text-4xl">${item.title}</h3>
                    </div>
                  </div>

                  <figcaption>
                    <p class="eyebrow mb-3">Note 0${index + 1}</p>
                    <p class="text-base leading-8 md:text-lg">${item.annotation}</p>
                  </figcaption>
                </figure>
              `).join("")}
            </div>
          `, "from-right")}

          ${renderCaseSection("05", "Outcomes & impact", `
            <div class="grid gap-4 sm:grid-cols-3">
              ${project.outcomes.metrics.map((metric) => `
                <div class="metric-card">
                  <p class="display-font text-4xl text-[var(--primary)] md:text-5xl">${metric.value}</p>
                  <p class="mt-2 text-sm leading-7 text-muted">${metric.label}</p>
                </div>
              `).join("")}
            </div>

            <p class="mt-8 text-base leading-8 md:text-lg">${project.outcomes.qualitative}</p>
          `, "from-left")}

          ${renderCaseSection("06", "Reflection", `
            <p class="display-font text-2xl leading-snug md:text-3xl">
              ${project.reflection}
            </p>
          `, "from-right")}

          <section class="container-x mt-24 reveal">
            <a href="project-detail.html?id=${next.id}" class="next-project-card group">
              <div>
                <p class="eyebrow mb-3">Next project</p>
                <h3 class="case-section-title">${next.title}</h3>
                <p class="mt-3 max-w-md text-muted">${next.tagline}</p>
              </div>

              <span class="project-arrow h-14 w-14">
                <i class="fa-solid fa-arrow-right"></i>
              </span>
            </a>
          </section>

        </article>
      `;

      initRevealAnimation();
      initThemeToggle();
      initMobileMenu();
      initScrollToTopButton();
    }

    function getGithubButton(project) {
      if (!project.github || project.github === "#") {
        return `
          <span class="project-github-btn is-disabled" aria-disabled="true">
            GitHub
            <i class="fa-brands fa-github text-sm"></i>
          </span>
        `;
      }

      return `
        <a 
          href="${project.github}" 
          target="_blank" 
          rel="noopener noreferrer" 
          class="project-github-btn"
        >
          GitHub
          <i class="fa-brands fa-github text-sm"></i>
        </a>
      `;
    }

    function renderCaseSection(eyebrow, title, content, direction) {
      return `
        <section class="container-x mt-24">
          <div class="reveal ${direction}">
            <div class="case-section-grid">
              <div>
                <p class="eyebrow mb-3">${eyebrow}</p>
                <h2 class="case-section-title">${title}</h2>
              </div>

              <div>
                ${content}
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function initRevealAnimation() {
      const revealItems = document.querySelectorAll(".reveal:not(.is-visible)");

      if (!("IntersectionObserver" in window)) {
        revealItems.forEach((item) => item.classList.add("is-visible"));
        return;
      }

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) return;

            const delay = entry.target.dataset.delay || "0";
            entry.target.style.transitionDelay = `${delay}ms`;
            entry.target.classList.add("is-visible");
            observer.unobserve(entry.target);
          });
        },
        {
          threshold: 0.12,
          rootMargin: "0px 0px -40px 0px"
        }
      );

      revealItems.forEach((item) => observer.observe(item));
    }

    function initThemeToggle() {
      const themeToggle = document.getElementById("themeToggle");
      const themeIcon = document.getElementById("themeIcon");

      if (!themeToggle || !themeIcon) return;

      const storedTheme = localStorage.getItem("theme");
      const initialTheme = storedTheme || "dark";

      document.documentElement.setAttribute("data-theme", initialTheme);
      themeIcon.className = initialTheme === "dark" ? "fa-regular fa-sun" : "fa-regular fa-moon";

      themeToggle.onclick = () => {
        const currentTheme = document.documentElement.getAttribute("data-theme");
        const nextTheme = currentTheme === "dark" ? "light" : "dark";

        document.documentElement.setAttribute("data-theme", nextTheme);
        localStorage.setItem("theme", nextTheme);
        themeIcon.className = nextTheme === "dark" ? "fa-regular fa-sun" : "fa-regular fa-moon";
      };
    }

    function initMobileMenu() {
      const menuBtn = document.getElementById("menuBtn");
      const mobileMenu = document.getElementById("mobileMenu");

      if (!menuBtn || !mobileMenu) return;

      menuBtn.onclick = () => {
        mobileMenu.classList.toggle("hidden");

        const icon = menuBtn.querySelector("i");
        if (!icon) return;

        icon.className = mobileMenu.classList.contains("hidden")
          ? "fa-solid fa-bars"
          : "fa-solid fa-xmark";
      };
    }

    function initScrollToTopButton() {
      const scrollButton = document.getElementById("scrollToTop");

      if (!scrollButton) return;

      window.addEventListener("scroll", () => {
        scrollButton.classList.toggle("show", window.scrollY > 500);
      }, { passive: true });

      scrollButton.onclick = () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      };
    }

    loadFooter();

    async function loadFooter() {
      const footerTarget = document.getElementById("footer");

      if (!footerTarget) return;

      try {
        const response = await fetch("../section/footer.html");

        if (!response.ok) {
          throw new Error("Footer failed to load");
        }

        footerTarget.innerHTML = await response.text();

        fixFooterLinksForPages();

        if (typeof initRevealAnimation === "function") {
          initRevealAnimation();
        }
      } catch (error) {
        console.error(error);
      }
    }

    function fixFooterLinksForPages() {
      const footer = document.getElementById("footer");

      if (!footer) return;

      footer.querySelectorAll("a").forEach((link) => {
        const href = link.getAttribute("href");

        if (!href) return;

        if (href === "#home") {
          link.setAttribute("href", "../index.html#home");
        }

        if (href === "index.html") {
          link.setAttribute("href", "../index.html");
        }

        if (href.startsWith("pages/")) {
          link.setAttribute("href", href.replace("pages/", ""));
        }

        if (href.startsWith("my cv/")) {
          link.setAttribute("href", "../" + href);
        }
      });
    }
  </script>
</body>
</html>
